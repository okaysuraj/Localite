spring.application.name=localite-backend

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/localite_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:localite_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:localite_password}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
