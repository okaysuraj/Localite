spring.application.name=localite-backend

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/localite_db
spring.datasource.username=localite_user
spring.datasource.password=localite_password

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
